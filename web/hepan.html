<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人合盘 · 命理解读师</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C8A96E;--gold-light:#E8C97E;--gold-dim:#8B7245;--crimson:#9B2335;--crimson-bright:#C42B3F;--ink:#07070C;--ink-mid:#101018;--ink-light:#1C1C2A;--ivory:#F2EBD9;--ivory-dim:#B8AA90;--teal:#3B7A85;--teal-light:#5BA8B5;--hair:rgba(200,169,110,0.18);--hair-soft:rgba(200,169,110,0.10)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--ivory);font-family:'Noto Serif SC',serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 18% 15%,rgba(60,40,100,.32) 0%,transparent 58%),radial-gradient(ellipse at 82% 85%,rgba(40,20,60,.42) 0%,transparent 58%),radial-gradient(ellipse at 50% -5%,rgba(155,35,53,.12) 0%,transparent 48%);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:36px 20px 80px}
  .topnav{display:flex;justify-content:flex-end;margin-bottom:8px}
  .topnav a{font-size:12px;color:var(--gold);text-decoration:none;border:1px solid var(--hair);border-radius:20px;padding:6px 14px;letter-spacing:1px}
  .topnav a:hover{border-color:var(--gold)}
  .header{text-align:center;padding:24px 0 30px}
  .header-eyebrow{font-size:11px;letter-spacing:7px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:16px}
  .header-title{font-family:'Ma Shan Zheng',serif;font-size:clamp(34px,6vw,54px);color:var(--gold);text-shadow:0 0 44px rgba(200,169,110,.35)}
  .header-sub{font-size:13px;color:var(--ivory-dim);letter-spacing:3px;margin-top:12px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .form-card{background:var(--ink-mid);border:1px solid var(--hair);border-radius:4px;padding:22px;box-shadow:0 8px 40px rgba(0,0,0,.45)}
  .form-card h3{font-family:'Ma Shan Zheng',serif;font-size:20px;color:var(--gold);margin-bottom:16px;letter-spacing:2px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  label{font-size:11px;letter-spacing:2px;color:var(--gold-dim)}
  input,select{background:var(--ink);border:1px solid var(--hair);border-radius:3px;color:var(--ivory);font-family:inherit;font-size:14px;padding:9px 11px;outline:none}
  input:focus,select:focus{border-color:var(--gold)}
  .chk{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--ivory-dim);cursor:pointer}
  .hint{font-size:11px;color:var(--ivory-dim);opacity:.7;line-height:1.6;text-align:center;margin-bottom:18px}
  .btn{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1408;border:none;border-radius:3px;font-family:'Noto Serif SC',serif;font-weight:600;font-size:15px;letter-spacing:2px;padding:13px 30px;cursor:pointer;transition:transform .2s,box-shadow .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,169,110,.35)}
  .btn-ghost{background:transparent;border:1px solid var(--hair);color:var(--gold);font-weight:400}
  .center{text-align:center}
  .err{display:none;background:rgba(155,35,53,.12);border:1px solid rgba(196,43,63,.4);border-radius:3px;padding:14px 16px;margin:18px 0;color:#FF9090;font-size:13px;white-space:pre-wrap}
  .err.on{display:block}
  .loading{display:none;flex-direction:column;align-items:center;padding:70px 0;gap:20px}
  .loading.on{display:flex}
  .orbit{position:relative;width:110px;height:110px}
  .orbit::before{content:'☯';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;color:var(--gold);animation:spin 4s linear infinite}
  .orbit i{position:absolute;inset:0;border:1px solid var(--hair);border-top-color:var(--gold);border-radius:50%;animation:spin 1.6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:'Ma Shan Zheng',serif;font-size:19px;color:var(--gold);letter-spacing:3px}
  #report{display:none}#report.on{display:block;animation:fadeUp .8s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .score-card{text-align:center;background:var(--ink-mid);border:1px solid rgba(200,169,110,.3);border-radius:4px;padding:34px 24px;margin-bottom:24px;background:linear-gradient(135deg,rgba(200,169,110,.05),rgba(155,35,53,.05))}
  .score-names{font-size:14px;color:var(--ivory-dim);letter-spacing:2px;margin-bottom:14px}
  .score-num{font-family:'Ma Shan Zheng',serif;font-size:64px;color:var(--gold);line-height:1;text-shadow:0 0 30px rgba(200,169,110,.4)}
  .score-num small{font-size:22px;color:var(--ivory-dim)}
  .score-verdict{font-size:16px;color:var(--gold-light);margin-top:10px;letter-spacing:2px}
  .score-track{height:6px;background:rgba(200,169,110,.12);border-radius:3px;margin:18px auto 0;max-width:420px;overflow:hidden}
  .score-fill{height:100%;background:linear-gradient(to right,var(--crimson),var(--gold-light));border-radius:3px}
  .section-title{font-size:11px;letter-spacing:6px;color:var(--gold-dim);text-transform:uppercase;margin:30px 0 18px;display:flex;align-items:center;gap:12px}
  .section-title::before{content:'✦';font-size:10px;color:var(--gold);opacity:.7}
  .section-title::after{content:'';flex:1;height:1px;background:var(--hair)}
  .card{background:var(--ink-mid);border:1px solid var(--hair-soft);border-radius:3px;padding:22px;margin-bottom:14px;position:relative}
  .card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gold),transparent 70%);opacity:.5}
  .card.warn-c::after{background:linear-gradient(to bottom,var(--crimson-bright),transparent 70%)}
  .card.good-c::after{background:linear-gradient(to bottom,#7CCC60,transparent 70%)}
  .card-h{font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;font-weight:600}
  .card-b{font-size:13.5px;line-height:2;color:var(--ivory-dim)}
  .card-b strong{color:var(--ivory)}.card-b em{color:var(--gold);font-style:normal}
  .warn{color:#FF8C60}.good{color:#7CCC60}
  .footer{text-align:center;padding:40px 0 8px}
  .footer-quote{font-family:'Ma Shan Zheng',serif;font-size:18px;color:rgba(200,169,110,.45);letter-spacing:4px;line-height:2}
  .footer-note{font-size:11px;color:rgba(200,169,110,.25);margin-top:12px;letter-spacing:2px}
  @media(max-width:640px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="topnav"><a href="ziwei.html">← 单人命盘</a></div>
  <div class="header">
    <div class="header-eyebrow">紫微合盘 · 命宫互入 · 四化互飞</div>
    <div class="header-title">双人合盘</div>
    <div class="header-sub">情侣 · 夫妻 · 合伙 —— 看契合、雷区与互补</div>
  </div>

  <div class="two">
    <div class="form-card">
      <h3>甲方</h3>
      <div class="field"><label>代号</label><input id="a-code" placeholder="如 我"></div>
      <div class="field"><label>性别</label><select id="a-gender"><option value="male">男</option><option value="female">女</option></select></div>
      <div class="field"><label>出生日期（公历）</label><input id="a-date" placeholder="YYYY-M-D 如 1991-8-15"></div>
      <div class="field"><label>出生时间（钟表/北京时间）</label><input id="a-time" placeholder="HH:MM 如 14:30"></div>
      <div class="field"><label>出生城市</label><select id="a-city"></select></div>
      <label class="chk"><input type="checkbox" id="a-manual">时辰不确定，手动指定</label>
      <div class="field" id="a-hourwrap" style="display:none;margin-top:8px"><select id="a-hour"></select></div>
    </div>
    <div class="form-card">
      <h3>乙方</h3>
      <div class="field"><label>代号</label><input id="b-code" placeholder="如 TA"></div>
      <div class="field"><label>性别</label><select id="b-gender"><option value="female">女</option><option value="male">男</option></select></div>
      <div class="field"><label>出生日期（公历）</label><input id="b-date" placeholder="YYYY-M-D"></div>
      <div class="field"><label>出生时间（钟表/北京时间）</label><input id="b-time" placeholder="HH:MM"></div>
      <div class="field"><label>出生城市</label><select id="b-city"></select></div>
      <label class="chk"><input type="checkbox" id="b-manual">时辰不确定，手动指定</label>
      <div class="field" id="b-hourwrap" style="display:none;margin-top:8px"><select id="b-hour"></select></div>
    </div>
  </div>
  <div class="hint">双方均在浏览器本地排盘，数据不上传。时辰会自动做真太阳时校正。</div>
  <div class="center"><button class="btn" id="goBtn">合盘 →</button> <span class="hint" id="status" style="display:inline">加载排盘引擎…</span></div>

  <div class="err" id="errBox"></div>
  <div class="loading" id="loading"><div class="orbit"><i></i></div><div class="loading-text">双盘相照…</div></div>

  <div id="report">
    <div class="score-card">
      <div class="score-names" id="rNames"></div>
      <div class="score-num" id="rScore">--<small>%</small></div>
      <div class="score-verdict" id="rVerdict"></div>
      <div class="score-track"><div class="score-fill" id="rFill" style="width:0"></div></div>
    </div>
    <div class="section-title">关系定位</div>
    <div id="rRelation"></div>
    <div class="section-title">四化互飞 · 吸引与互补</div>
    <div id="rGood"></div>
    <div class="section-title">四化互飞 · 雷区</div>
    <div id="rWarn"></div>
    <div class="center" style="margin-top:24px"><button class="btn-ghost btn" id="resetBtn">重新合盘</button></div>
    <div class="footer"><div class="footer-quote">缘分是概率<br>相处是修行</div><div class="footer-note">合盘看的是倾向与课题，不是判决</div></div>
  </div>
</div>

<script type="module">
import { astro } from 'https://esm.sh/iztro@2';
const CITY_LON={'北京':116.41,'上海':121.47,'天津':117.20,'重庆':106.55,'广州':113.27,'深圳':114.06,'香港':114.17,'澳门':113.55,'杭州':120.16,'南京':118.80,'苏州':120.62,'宁波':121.55,'成都':104.07,'武汉':114.31,'西安':108.95,'郑州':113.62,'长沙':112.94,'南昌':115.86,'合肥':117.23,'济南':117.00,'青岛':120.38,'沈阳':123.43,'大连':121.62,'哈尔滨':126.53,'长春':125.32,'石家庄':114.51,'太原':112.55,'呼和浩特':111.75,'福州':119.30,'厦门':118.10,'南宁':108.37,'昆明':102.71,'贵阳':106.71,'兰州':103.83,'西宁':101.78,'银川':106.23,'乌鲁木齐':87.62,'拉萨':91.13,'海口':110.35,'台北':121.56};
const DST=[['1986-05-04','1986-09-14'],['1987-04-12','1987-09-13'],['1988-04-17','1988-09-11'],['1989-04-16','1989-09-17'],['1990-04-15','1990-09-16'],['1991-04-14','1991-09-15']];
const HOUR_NAMES={0:'早子(00-01)',1:'丑(01-03)',2:'寅(03-05)',3:'卯(05-07)',4:'辰(07-09)',5:'巳(09-11)',6:'午(11-13)',7:'未(13-15)',8:'申(15-17)',9:'酉(17-19)',10:'戌(19-21)',11:'亥(21-23)',12:'晚子(23-00)'};
function doy(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);}
function eot(d){const b=2*Math.PI/365*(doy(d)-81);return 9.87*Math.sin(2*b)-7.53*Math.cos(b)-1.5*Math.sin(b);}
function inDst(d){const t=d.getTime();return DST.some(([s,e])=>{const sd=new Date(s+'T00:00:00'),ed=new Date(e+'T00:00:00');ed.setDate(ed.getDate()+1);return t>=sd.getTime()&&t<ed.getTime();});}
function hIdx(d){const t=d.getHours()+d.getMinutes()/60;if(t>=23)return 12;if(t<1)return 0;return Math.floor((t+1)/2);}
function correct(dateStr,timeStr,lon){const[y,mo,da]=dateStr.split('-').map(Number);const[hh,mm]=timeStr.split(':').map(Number);const dt=new Date(y,mo-1,da,hh,mm);const off=(inDst(dt)?-60:0)+(lon-120)*4+eot(dt);const td=new Date(dt.getTime()+off*60000);return{idx:hIdx(td),date:`${td.getFullYear()}-${td.getMonth()+1}-${td.getDate()}`};}

const $=id=>document.getElementById(id);
['a','b'].forEach(k=>{
  const city=$(k+'-city');Object.keys(CITY_LON).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;city.appendChild(o);});
  const ho=$(k+'-hour');for(let i=0;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=HOUR_NAMES[i];ho.appendChild(o);}
  $(k+'-manual').addEventListener('change',e=>{$(k+'-hourwrap').style.display=e.target.checked?'block':'none';});
});
$('status').textContent=astro?'引擎就绪 ✓':'引擎加载失败';$('status').style.color='var(--teal-light)';
function showErr(m){$('errBox').textContent='⚠ '+m;$('errBox').classList.add('on');$('loading').classList.remove('on');}

function buildChart(k){
  const date=$(k+'-date').value.trim(),time=$(k+'-time').value.trim(),gender=$(k+'-gender').value,manual=$(k+'-manual').checked,lon=CITY_LON[$(k+'-city').value];
  if(!date)throw new Error((k==='a'?'甲方':'乙方')+'缺出生日期');
  let idx,d=date;
  if(manual)idx=parseInt($(k+'-hour').value,10);
  else{if(!/^\d{1,2}:\d{2}$/.test(time))throw new Error((k==='a'?'甲方':'乙方')+'请填时间 HH:MM 或勾选手动时辰');const c=correct(date,time,lon);idx=c.idx;d=c.date;}
  return astro.bySolar(d,idx,gender==='male'?'男':'女',true,'zh-CN');
}
// 工具
function yearHua(chart){const out=[];chart.palaces.forEach(p=>{[...(p.majorStars||[]),...(p.minorStars||[])].forEach(s=>{if(s.mutagen)out.push({star:s.name,hua:s.mutagen});});});return out;}
function palByBranch(chart,br){return chart.palaces.find(p=>p.earthlyBranch===br);}
function palOfStar(chart,star){const p=chart.palaces.find(x=>[...(x.majorStars||[]),...(x.minorStars||[])].some(s=>s.name===star));return p?p.name:null;}
const REL={'命宫':{s:8,t:'叠对方命宫——三观气场相近，像照镜子，易共鸣也易较劲'},'夫妻':{s:13,t:'落对方夫妻宫——天生的伴侣缘，最适合谈感情、走入婚姻'},'财帛':{s:9,t:'落对方财帛宫——与对方钱财有缘，利合伙、共同经营'},'官禄':{s:10,t:'落对方官禄宫——事业上的助力或搭档，利共事打拼'},'福德':{s:10,t:'落对方福德宫——精神契合、相处轻松，聊得来、待得住'},'迁移':{s:8,t:'落对方迁移宫——缘起于外出社交，是对方向外的贵人'},'子女':{s:7,t:'落对方子女宫——缘分偏亲密/桃花/合伙，相处随性'},'田宅':{s:9,t:'落对方田宅宫——能成家共居之缘，顾家、稳定'},'兄弟':{s:7,t:'落对方兄弟宫——像平辈知己/兄弟姐妹，讲义气但激情少'},'父母':{s:5,t:'落对方父母宫——偏照顾/管束，一方像长辈，易有代沟感'},'仆役':{s:5,t:'落对方仆役宫——更像朋友同事，亲密度需要刻意经营'},'疾厄':{s:4,t:'落对方疾厄宫——牵绊深、易互相消耗，相处节奏要留心'}};
const FLY={'禄':{good:1,t:'带来资源与喜爱，是主动的吸引与给予'},'权':{good:0,t:'带来推动与主导，想替对方拿主意（用好是助力，过了是控制）'},'科':{good:1,t:'带来欣赏与体面，精神层面的看重'},'忌':{good:-1,t:'最上心也最易纠结——在意、计较、放不下，是雷区也是羁绊'}};

$('goBtn').addEventListener('click',async()=>{
  $('errBox').classList.remove('on');
  let A,B;
  try{A=buildChart('a');B=buildChart('b');}catch(e){showErr(e.message);return;}
  $('loading').classList.add('on');await new Promise(r=>setTimeout(r,800));
  try{render(A,B);}catch(e){showErr('合盘失败：'+e.message);return;}
  $('loading').classList.remove('on');$('report').classList.add('on');$('report').scrollIntoView({behavior:'smooth'});
});

function render(A,B){
  const an=$('a-code').value.trim()||'甲方',bn=$('b-code').value.trim()||'乙方';
  // 命宫互入
  const aBr=A.earthlyBranchOfSoulPalace,bBr=B.earthlyBranchOfSoulPalace;
  const aInB=palByBranch(B,aBr), bInA=palByBranch(A,bBr);
  const relA=REL[aInB?aInB.name:'']||{s:6,t:'关系定位综合判断'};
  const relB=REL[bInA?bInA.name:'']||{s:6,t:'关系定位综合判断'};
  // 四化互飞
  const aFly=yearHua(A).map(h=>({...h,to:palOfStar(B,h.star)})).filter(x=>x.to);
  const bFly=yearHua(B).map(h=>({...h,to:palOfStar(A,h.star)})).filter(x=>x.to);
  // 评分：关系定位 + 四化互飞（禄+6 科+4 权+2 忌-6）
  let score=46+(relA.s-7)+(relB.s-7);
  [...aFly,...bFly].forEach(f=>{score+= f.hua==='禄'?6 : f.hua==='科'?4 : f.hua==='权'?2 : f.hua==='忌'?-6 : 0;});
  score=Math.max(28,Math.min(96,Math.round(score)));
  const verdict=score>=82?'天作之合 · 极契合':score>=68?'良配 · 顺多于逆':score>=52?'有缘 · 需要用心经营':'磨合型 · 课题较多';
  $('rNames').textContent=`${an}　×　${bn}`;
  $('rScore').innerHTML=`${score}<small>%</small>`;$('rVerdict').textContent=verdict;
  setTimeout(()=>{$('rFill').style.width=score+'%';},100);
  // 关系定位
  $('rRelation').innerHTML=
    `<div class="card"><div class="card-h">${an} 看 ${bn}</div><div class="card-b">${an}的命宫${relA.t}。</div></div>`+
    `<div class="card"><div class="card-h">${bn} 看 ${an}</div><div class="card-b">${bn}的命宫${relB.t}。</div></div>`;
  // 吸引互补（禄权科）
  const good=[...aFly.filter(f=>f.hua!=='忌').map(f=>({...f,from:an,toName:bn})),...bFly.filter(f=>f.hua!=='忌').map(f=>({...f,from:bn,toName:an}))];
  $('rGood').innerHTML=good.length?good.map(f=>`<div class="card good-c"><div class="card-h">${f.from} → ${f.toName}</div><div class="card-b"><em>${f.star}化${f.hua}</em> 飞入 ${f.toName} 的【${f.to}】：${FLY[f.hua].t}。</div></div>`).join(''):'<div class="card"><div class="card-b">双方四化吸引偏弱，缘分更靠后天经营与共同经历积累。</div></div>';
  // 雷区（忌）
  const warn=[...aFly.filter(f=>f.hua==='忌').map(f=>({...f,from:an,toName:bn})),...bFly.filter(f=>f.hua==='忌').map(f=>({...f,from:bn,toName:an}))];
  $('rWarn').innerHTML=warn.length?warn.map(f=>`<div class="card warn-c"><div class="card-h">${f.from} → ${f.toName}　<span class="warn">雷区</span></div><div class="card-b"><em>${f.star}化忌</em> 飞入 ${f.toName} 的【${f.to}】：${f.from} 对 ${f.toName} 在此事上最上心、也最容易计较纠结。点破了是深情，憋着了是消耗——<span class="warn">把话说开是关键</span>。</div></div>`).join(''):'<div class="card good-c"><div class="card-b"><span class="good">没有明显的化忌互飞，相处中少纠缠、负担轻，是难得的省心组合。</span></div></div>';
}
$('resetBtn').addEventListener('click',()=>{$('report').classList.remove('on');window.scrollTo({top:0,behavior:'smooth'});});
</script>
</body>
</html>
